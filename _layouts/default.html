<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="{{ site.baseurl }}/assets/js/search.js" defer></script>

</head>

<body>
  <div class="container">
    {% include header.html %}
    <br><br>
    {{ content }}
    {% include footer.html %}
    <br><br>
  </div>

  <div id="search-modal" class="search-modal">
    <div class="search-modal-content">
      <div class="search-modal-header">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="search-input" placeholder="Search articles..." autocomplete="off">
        <button id="search-close" class="search-close" aria-label="Close search">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div id="search-results" class="search-results"></div>
      <div class="search-modal-footer">
        <span class="search-hint"><kbd>/</kbd> to open · <kbd>esc</kbd> to close</span>
      </div>
    </div>
  </div>
</body>

</html>
